name: iOS CI (build + test)
# NOTE: iOS builds need a macOS runner, which requires PAID GitHub Actions minutes (10x cost).
# Enable Actions spending (Settings → Billing → set a macOS spending limit / add a payment method),
# then trigger this manually. Until then it's dispatch-only so it doesn't auto-fail every push.
# (The app's existing scripts/release.sh + test.sh remain the local release pipeline.)
on:
  workflow_dispatch:
concurrency: { group: ios-ci-${{ github.ref }}, cancel-in-progress: true }
jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project (+ stub secrets so it resolves; no real keys needed for tests)
        working-directory: HealthAggregator
        run: |
          [ -f Secrets.xcconfig ] || cp Secrets.xcconfig.example Secrets.xcconfig
          xcodegen generate
      - name: Build & test (no signing)
        working-directory: HealthAggregator
        run: |
          set -o pipefail
          xcodebuild test \
            -project HealthAggregator.xcodeproj \
            -scheme HealthAggregator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO | xcbeautify || \
          xcodebuild test \
            -project HealthAggregator.xcodeproj \
            -scheme HealthAggregator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
