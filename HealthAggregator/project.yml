name: HealthAggregator
options:
  bundleIdPrefix: com.healthaggregator
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "S6FSYG26T8"
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  HealthAggregator:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HealthAggregator
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ctkrug.healthplus
        INFOPLIST_FILE: HealthAggregator/Info.plist
        CODE_SIGN_ENTITLEMENTS: HealthAggregator/HealthAggregator.entitlements
        MARKETING_VERSION: "1.11.0"
        CURRENT_PROJECT_VERSION: "34"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
    capabilities:
      com.apple.developer.healthkit: enabled
      com.apple.developer.applesignin: enabled
      com.apple.developer.usernotifications.time-sensitive: enabled
      com.apple.security.application-groups:
        - group.com.ctkrug.healthplus
    dependencies:
      - target: HealthAggregatorWidgets

  HealthAggregatorTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HealthAggregatorTests
    dependencies:
      - target: HealthAggregator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ctkrug.healthplus.tests
        GENERATE_INFOPLIST_FILE: YES
        # TEST_HOST / BUNDLE_LOADER are added automatically by XcodeGen because this
        # unit-test target depends on the HealthAggregator app target.

  HealthAggregatorWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HealthAggregatorWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ctkrug.healthplus.widgets
        INFOPLIST_FILE: HealthAggregatorWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: HealthAggregatorWidgets/HealthAggregatorWidgets.entitlements
        MARKETING_VERSION: "1.11.0"
        CURRENT_PROJECT_VERSION: "34"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: AccentColor
    capabilities:
      com.apple.security.application-groups:
        - group.com.ctkrug.healthplus

schemes:
  HealthAggregator:
    build:
      targets:
        HealthAggregator: all
        HealthAggregatorTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - HealthAggregatorTests
    archive:
      config: Release
    profile:
      config: Release
