name: HealthAggregator
options:
  bundleIdPrefix: com.healthaggregator
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  HealthAggregator:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HealthAggregator
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healthaggregator.app
        INFOPLIST_FILE: HealthAggregator/Info.plist
        CODE_SIGN_ENTITLEMENTS: HealthAggregator/HealthAggregator.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - target: HealthAggregatorWidgets

  HealthAggregatorWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HealthAggregatorWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healthaggregator.app.widgets
        INFOPLIST_FILE: HealthAggregatorWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: HealthAggregatorWidgets/HealthAggregatorWidgets.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
